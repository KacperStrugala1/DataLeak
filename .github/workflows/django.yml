name: Data Leaks CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Install requirements
        run: pip install -r requirements.txt
